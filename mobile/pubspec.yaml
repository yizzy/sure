name: sure_mobile
description: A mobile app for Sure personal finance management
publish_to: 'none'
version: 0.6.9+20260402

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  # flutter_localizations pins intl per Flutter SDK (0.19.x on <3.32, 0.20.x on
  # 3.32+). Per the Flutter i18n guide, use `any` so the SDK-constrained version
  # is selected instead of pinning a version that conflicts with our Flutter floor.
  intl: any
  sqflite: ^2.4.2
  path: ^1.9.1
  connectivity_plus: ^7.0.0
  uuid: ^4.5.2
  app_links: ^6.4.0
  url_launcher: ^6.2.5
  flutter_svg: ^2.2.0
  package_info_plus: ^8.0.0
  local_auth: ^2.3.0
  flutter_markdown: ^0.7.2
  sentry_flutter: ^8.14.2
  upgrader: ^13.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/icons/lucide/
  # Geist + Geist Mono (SIL OFL-1.1 — see assets/fonts/OFL.txt). The theme
  # (SureTokens.fontSans/fontMono) already names these families; bundling the
  # assets here makes them actually render instead of falling back to the
  # platform system font.
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  image_path_ios_dark_transparent: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
